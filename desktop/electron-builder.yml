appId: io.spherelink.desktop
productName: Spherelink

directories:
  output: dist

files:
  - "src/**/*"
  - "package.json"

extraResources:
  - from: "resources/"
    to: "resources/"
  # Pre-baked user data, produced by `npm run prepare-seed` before build.
  # Safe to omit (electron-builder tolerates a missing `from` path); a normal
  # build without prepare-seed will just have no pre-loaded memories.
  - from: "build-userdata/"
    to: "userdata/"

asarUnpack:
  - "**/better-sqlite3/**"
  - "**/sharp/**"
  - "**/@img/**"

mac:
  category: public.app-category.photography
  # Arch is supplied by the build script (--x64 / --arm64). Don't hardcode it
  # here — doing so pins every `electron-builder --mac` invocation to one arch.
  target:
    - target: dir
  icon: build/icon.png

# Post-build cleanup:
#  - trims non-English locales from the Electron Framework (~45MB)
#  - strips the bundled Joe's Boat seed when userdata was already populated
#    by prepare-seed (~24MB)
afterPack: "scripts/after-pack.js"
